# .github/workflows/setup-prod.yml
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME: configures passwordless sudo and installs Docker on yourname-prod.
# Trigger: manual (workflow_dispatch) — run ONCE after provisioning the VM.
# Never runs automatically. Never run again unless you rebuild the VM.
#
# No Docker required on yourname-runner — uses native ssh only.
#
# REQUIRED GITHUB SECRETS:
#   PROD_HOST    — IP address of yourname-prod
#   PROD_USER    — SSH username (e.g. student)
#   PROD_SSH_KEY — SSH private key (full contents of deploy_key_prod)
#   SUDO_PASS    — sudo password for PROD_USER on yourname-prod
#
# env: SSH_KEY passes the multi-line private key through an environment variable
# instead of inline ${{ secrets.* }} — this preserves newlines and PEM headers
# correctly. Using secrets inline in run: strips newlines causing 'invalid format'.
# ─────────────────────────────────────────────────────────────────────────────

name: "Setup — Production Server"

on:
  workflow_dispatch:   # Manual trigger only — no automatic runs

jobs:
  setup:
    name: "Install Docker on Production VM"
    runs-on: self-hosted

    steps:
      # ── Step 1: Configure passwordless sudo ────────────────────────────────
      # Pipeline SSH sessions are non-interactive — no terminal to type a password.
      # sudo -S reads the password from stdin via SUDO_PASS secret.
      # The guard makes this step safe to re-run.
      - name: Configure passwordless sudo
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/prod_key
          chmod 600 /tmp/prod_key

          ssh -i /tmp/prod_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "if sudo -n true 2>/dev/null; then
              echo '=== Passwordless sudo already configured — skipping ==='
            else
              echo '=== Configuring passwordless sudo ==='
              echo '${{ secrets.SUDO_PASS }}' | sudo -S bash -c \
                'echo \"${{ secrets.PROD_USER }} ALL=(ALL) NOPASSWD:ALL\" > /etc/sudoers.d/${{ secrets.PROD_USER }} && chmod 0440 /etc/sudoers.d/${{ secrets.PROD_USER }}'
              echo '=== Passwordless sudo configured ==='
            fi"

          rm /tmp/prod_key

      # ── Step 2: Install Docker Engine ──────────────────────────────────────
      # Uses the official get.docker.com convenience script — supported on
      # Ubuntu 22.04 (Jammy) and 24.04 (Noble).
      # $(whoami) expands on the Production VM at runtime — no hardcoded username.
      # The 'if ! command -v docker' guard makes this step safe to re-run.
      - name: Install Docker on Production VM
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/prod_key
          chmod 600 /tmp/prod_key

          ssh -i /tmp/prod_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
          set -e
          if ! command -v docker &> /dev/null; then
            echo "=== Docker not found — installing ==="
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker $(whoami)
            sudo mkdir -p /opt/app && sudo chown $(whoami):$(whoami) /opt/app
            rm get-docker.sh
            echo "=== Docker installed successfully ==="
          else
            echo "=== Docker already present — skipping install ==="
            sudo mkdir -p /opt/app && sudo chown $(whoami):$(whoami) /opt/app
          fi
          EOF

          rm /tmp/prod_key

      # ── Step 3: Verify the installation ────────────────────────────────────
      # Confirms Docker and Docker Compose are available before deploy-prod.yml runs.
      - name: Verify Docker
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/prod_key
          chmod 600 /tmp/prod_key

          ssh -i /tmp/prod_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
          set -e
          echo "=== Logged in as: $(whoami) ==="
          docker --version
          docker compose version
          ls -la /opt/app
          echo "=== Production server is ready for deployment ==="
          EOF

          rm /tmp/prod_key
